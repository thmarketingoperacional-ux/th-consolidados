<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TH Marketing — Consolidados Semanais</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e0e6;
    --text-muted: #8b8fa3;
    --blue: #60a5fa;
    --green: #34d399;
    --meta: #1877f2;
    --google: #4285f4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 560px; width: 100%; padding: 32px 20px; }
  .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .subtitle { color: var(--text-muted); font-size: .9rem; margin-bottom: 36px; }
  .week-list { list-style: none; }
  .week-list li { margin-bottom: 14px; }
  .week-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 22px;
    transition: border-color .2s;
  }
  .week-card:hover { border-color: var(--blue); }
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .week-label { font-weight: 600; font-size: 1rem; }
  .week-period { font-size: .82rem; color: var(--text-muted); margin-top: 2px; }
  .week-badge { font-size: .72rem; padding: 4px 12px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
  .badge-current { background: rgba(52,211,153,.12); color: var(--green); }
  .badge-previous { background: rgba(139,143,163,.1); color: var(--text-muted); }
  .platform-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 140px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px; border-radius: 8px;
    text-decoration: none; font-weight: 600; font-size: .88rem;
    transition: transform .15s, filter .15s;
    color: white;
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.15); }
  .btn-meta { background: var(--meta); }
  .btn-google { background: var(--google); }
  .btn-icon { font-size: .9rem; }
  .footer { margin-top: 40px; text-align: center; font-size: .75rem; color: var(--text-muted); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">TH Marketing</div>
  <div class="subtitle">Consolidados Semanais — Meta Ads e Google Ads</div>
  <ul class="week-list" id="weekList"></ul>
  <div class="footer">Atualizado semanalmente toda segunda-feira</div>
</div>
<script>
  // Weeks config — update this array each week (newest first, max 2)
  // platforms indica quais relatorios existem naquela semana
  //   meta.url / google.url = caminho do index.html daquela plataforma
  const weeks = [
    {
      date: '2026-04-27',
      period: '20/04 a 26/04/2026',
      label: 'Semana 27/04',
      platforms: {
        meta: { url: './2026-04-27/meta/' },
      },
    },
    {
      date: '2026-04-20',
      period: '13/04 a 19/04/2026',
      label: 'Semana 20/04',
      platforms: {
        meta:   { url: './2026-04-20/' },
        google: { url: './2026-04-20/google/' },
      },
    },
  ];

  const list = document.getElementById('weekList');
  weeks.forEach((w, i) => {
    const li = document.createElement('li');
    const badge = i === 0
      ? '<span class="week-badge badge-current">Atual</span>'
      : '<span class="week-badge badge-previous">Anterior</span>';

    const buttons = [];
    if (w.platforms.meta) {
      buttons.push(`<a href="${w.platforms.meta.url}" class="btn btn-meta"><span class="btn-icon">■</span> Meta Ads</a>`);
    }
    if (w.platforms.google) {
      buttons.push(`<a href="${w.platforms.google.url}" class="btn btn-google"><span class="btn-icon">●</span> Google Ads</a>`);
    }

    li.innerHTML = `
      <div class="week-card">
        <div class="week-header">
          <div>
            <div class="week-label">${w.label}</div>
            <div class="week-period">${w.period}</div>
          </div>
          ${badge}
        </div>
        <div class="platform-buttons">${buttons.join('')}</div>
      </div>
    `;
    list.appendChild(li);
  });
</script>
</body>
</html>
